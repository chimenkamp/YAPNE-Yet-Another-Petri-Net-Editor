<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 751" role="img" aria-labelledby="title desc">
  <title id="title">YAPNE logo</title>
  <desc id="desc">A stylized Data Petri net with guarded transitions, variable updates, tokens, and a simulation timeline above the YAPNE name.</desc>
  <defs>
